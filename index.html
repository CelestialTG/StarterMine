<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOD_NEXUS // GLOBAL WIKI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800;900&family=Pixelify+Sans:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Фоновые неоновые сферы -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="glass-container">
        <header class="max-header">
            <h1 class="glitch-title">MOD_NEXUS</h1>
            <p class="subtitle">ГЛОБАЛЬНАЯ БАЗА И СБОРЩИК КОНТЕНТА</p>
        </header>

        <section class="max-filters">
            <div class="input-wrapper">
                <label>ВЕРСИЯ</label>
                <select id="version-select" class="glass-input">
                    <option value="1.21.11">1.21.11 (Latest)</option>
                    <option value="1.21.10">1.21.10</option>
                    <option value="1.21.4">1.21.4</option>
                    <option value="1.21.1">1.21.1</option>
                    <option value="1.20.6">1.20.6</option>
                    <option value="1.20.1">1.20.1</option>
                    <option value="1.19.4">1.19.4</option>
                </select>
            </div>

            <div class="input-wrapper">
                <label>ТИП КОНТЕНТА</label>
                <select id="type-select" class="glass-input">
                    <option value="mod">Моды / Плагины</option>
                    <option value="modpack">Модпаки (Сборки)</option>
                    <option value="resourcepack">Текстур-паки</option>
                    <option value="shader">Шейдеры</option>
                </select>
            </div>

            <div class="input-wrapper">
                <label>ЗАГРУЗЧИК</label>
                <select id="loader-select" class="glass-input">
                    <option value="fabric">Fabric</option>
                    <option value="forge">Forge</option>
                    <option value="neoforge">NeoForge</option>
                    <option value="paper">Paper (Плагины)</option>
                </select>
            </div>

            <div class="input-wrapper search-wrapper">
                <label>ПОИСК ПО БАЗЕ</label>
                <input type="text" id="search-input" class="glass-input" placeholder="Введите название...">
            </div>

            <button id="search-btn" class="neon-btn">ИСКАТЬ</button>
        </section>

        <!-- Смарт-теги -->
        <section class="smart-tags" id="smart-tags">
            <button class="tag-btn" data-tag="optimization">⚡ Оптимизация</button>
            <button class="tag-btn" data-tag="technology">⚙️ Технологии</button>
            <button class="tag-btn" data-tag="magic">🪄 Магия</button>
            <button class="tag-btn" data-tag="worldgen">🌍 Генерация</button>
            <button class="tag-btn" data-tag="storage">📦 Склады</button>
        </section>

        <section id="results" class="max-results">
            <div class="status-message">СИНХРОНИЗАЦИЯ...</div>
        </section>

        <!-- Пагинация -->
        <section class="pagination">
            <button id="prev-btn" class="page-btn" disabled>◄ НАЗАД</button>
            <span id="page-indicator" class="page-info">СТРАНИЦА 1</span>
            <button id="next-btn" class="page-btn">ВПЕРЕД ►</button>
        </section>
    </main>

    <!-- Плавающая корзина -->
    <div id="cart-panel" class="cart-panel hidden">
        <div class="cart-header">
            <h3>ВЫБРАНО: <span id="cart-count">0</span></h3>
            <button id="clear-cart-btn" class="icon-btn">❌</button>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <button id="download-all-btn" class="neon-btn cart-download-btn">СКАЧАТЬ ВСЕ</button>
    </div>

    <!-- НОВОЕ: ГЛОБАЛЬНОЕ ОКНО ДЕТАЛЕЙ ПРОЕКТА -->
    <div id="project-modal" class="modal-overlay hidden">
        <div class="modal-content glass-container">
            <button id="close-modal-btn" class="modal-close-btn">✖</button>
            <div id="modal-body" class="modal-grid">
                <!-- Контент генерируется через JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
